version: '3.8'
services:

  kafka:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  redis:
    image: redis
    ports:
      - "6379:6379"

  notification1:
    build: ./services/notification-service
    environment:
      INSTANCE_ID: 1
    depends_on:
      - kafka
      - mongo
      - redis

  notification2:
    build: ./services/notification-service
    environment:
      INSTANCE_ID: 2
    depends_on:
      - kafka
      - mongo
      - redis

  nginx:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - ./load-balancer/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - notification1
      - notification2